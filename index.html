<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Master: 3030 Pro</title>
    <script src="./coi-serviceworker.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 30px auto; padding: 20px; background-color: #0f0f0f; color: white; }
        .panel { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #ff0000; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        .section { margin-bottom: 20px; padding: 15px; background: #252525; border-radius: 10px; border-left: 4px solid #ff0000; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #aaa; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; border-radius: 6px; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        input, select { background: #333; border: 1px solid #444; color: white; }
        button { background: #ff0000; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #cc0000; }
        button:disabled { background: #444; cursor: not-allowed; }
        #status { text-align: center; color: #00ff00; font-family: 'Courier New', monospace; font-size: 13px; margin: 15px 0; min-height: 18px; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .video-card { background: #000; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #444; position: relative; }
        video { width: 100%; border-radius: 4px; background: #000; aspect-ratio: 9/16; object-fit: cover; }
        .dl-btn { background: #00ff00; color: #000; padding: 8px; font-size: 11px; text-decoration: none; display: block; border-radius: 4px; font-weight: bold; margin-top: 5px; }
        .warning { color: #ffae00; font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="panel">
    <h1>Shorts Master</h1>
    <div id="status">Status: Initializing...</div>

    <div class="section">
        <label>1. Source (Upload File OR Paste URL)</label>
        <input type="file" id="videoInput" accept="video/*">
        <input type="text" id="urlInput" placeholder="https://example.com/video.mp4">
        <div id="sizeWarning" class="warning">⚠️ Large file detected! Browser may slow down.</div>

        <label>2. Automatic Slicing</label>
        <select id="segmentLen">
            <option value="15">Every 15 Seconds</option>
            <option value="30">Every 30 Seconds</option>
            <option value="60" selected>Every 60 Seconds</option>
        </select>

        <label>3. Style</label>
        <select id="modeSelect">
            <option value="crop">9:16 Center Crop</option>
            <option value="fit">9:16 Letterbox</option>
        </select>

        <button id="startBtn">GENERATE SHORTS</button>
    </div>

    <div id="results" class="results-grid"></div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    
    // Config: Proxy to fix CORS issues for URL loading
    const PROXY_URL = "https://corsproxy.io/?"; 

    const startBtn = document.getElementById('startBtn');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    startBtn.addEventListener('click', async () => {
        const file = document.getElementById('videoInput').files[0];
        const rawUrl = document.getElementById('urlInput').value.trim();
        const interval = parseInt(document.getElementById('segmentLen').value);
        
        if (!file && !rawUrl) return alert("Please provide a video source!");

        startBtn.disabled = true;
        results.innerHTML = "";
        
        try {
            if (!ffmpeg.isLoaded()) await ffmpeg.load();
            status.innerText = "⚡ Loading Source Data...";

            // Load Data (CORS handled for URLs)
            let videoData;
            if (file) {
                videoData = await fetchFile(file);
            } else {
                const proxyUrl = PROXY_URL + encodeURIComponent(rawUrl);
                status.innerText = "⚡ Fetching through Proxy...";
                videoData = await fetchFile(proxyUrl);
            }

            ffmpeg.FS('writeFile', 'input.mp4', videoData);

            // AUTO-SLICING LOGIC
            let currentTime = 0;
            let segmentIdx = 1;
            const limit = 6; // Safety limit: Stop after 6 segments to prevent crash

            while (segmentIdx <= limit) {
                status.innerText = `🎬 Processing Part ${segmentIdx} (${currentTime}s)...`;

                const outputName = `part_${segmentIdx}.mp4`;
                const mode = document.getElementById('modeSelect').value;
                const filter = (mode === 'crop') 
                    ? 'scale=w=-1:h=1920,crop=1080:1920,setsar=1' 
                    : 'scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2';

                // Command optimized for PLAYABILITY and SIZE
                await ffmpeg.run(
                    '-ss', currentTime.toString(),
                    '-i', 'input.mp4',
                    '-t', interval.toString(),
                    '-vf', filter,
                    '-c:v', 'libx264',
                    '-preset', 'ultrafast',
                    '-pix_fmt', 'yuv420p',
                    '-movflags', '+faststart',
                    '-an', // Removing audio for faster processing (optional)
                    outputName
                );

                const data = ffmpeg.FS('readFile', outputName);
                if (data.length < 50000) break; // End of video reached

                const blob = new Blob([data.buffer], { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);

                // Create Result UI
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <video src="${url}" controls playsinline></video>
                    <div style="font-size:12px; margin:5px 0;">Part ${segmentIdx}</div>
                    <a href="${url}" download="short_part_${segmentIdx}.mp4" class="dl-btn">SAVE TO DEVICE</a>
                `;
                results.appendChild(card);

                // Cleanup Memory
                ffmpeg.FS('unlink', outputName);
                currentTime += interval;
                segmentIdx++;
            }

            status.innerText = "✨ ALL SHORTS READY!";
        } catch (err) {
            status.innerText = "❌ ERROR: Check CORS or File Format";
            console.error(err);
        } finally {
            startBtn.disabled = false;
        }
    });

    // Initial check for SharedArrayBuffer
    window.onload = () => {
        if (!window.crossOriginIsolated) {
            status.innerText = "⚠️ Security Headers Missing. Reloading...";
        } else {
            status.innerText = "Status: Engine Ready";
        }
    };
</script>
</body>
</html>
