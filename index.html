<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shorts Master: GitHub Edition</title>
    <script src="https://cdn.jsdelivr.net/gh/gzuidhof/coi-serviceworker@latest/coi-serviceworker.min.js"></script>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 600px; margin: 30px auto; padding: 20px; background-color: #0f0f0f; color: white; }
        .panel { background: #1e1e1e; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        h1 { color: #ff0000; text-align: center; }
        .section { margin-bottom: 20px; padding: 15px; background: #252525; border-radius: 10px; border-left: 4px solid #ff0000; }
        input[type="file"], select { width: 100%; padding: 12px; background: #333; border: 1px solid #444; border-radius: 6px; color: white; margin-bottom: 10px; cursor: pointer; }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-convert { background: #ff0000; color: white; }
        .btn-download { background: #00ff00; color: #000; display: none; }
        #status { text-align: center; margin: 15px 0; color: #00ff00; font-family: monospace; font-size: 13px; }
        .preview { display: none; text-align: center; margin-top: 20px; border-top: 1px solid #444; padding-top: 20px; }
        video { width: 180px; border: 3px solid #333; border-radius: 8px; }
    </style>
</head>
<body>

<div class="panel">
    <h1>Shorts Master</h1>
    <p style="text-align:center; font-size: 12px; color: #888;">GitHub Pages Compatibility Active</p>
    
    <div class="section">
        <label>1. Select Video</label>
        <input type="file" id="videoInput" accept="video/*">
        
        <label>2. Style</label>
        <select id="modeSelect">
            <option value="crop">9:16 Center Crop</option>
            <option value="fit">9:16 Letterbox</option>
        </select>
        
        <button id="convertBtn" class="btn-convert">CONVERT FIRST 10s</button>
    </div>

    <div id="status">Status: Waiting for video...</div>

    <div class="preview" id="previewArea">
        <video id="outputVideo" controls></video>
        <button id="downloadBtn" class="btn-download">💾 DOWNLOAD .MP4</button>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    let finalVideoBlobUrl = null;

    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const status = document.getElementById('status');
    const previewArea = document.getElementById('previewArea');
    const outputVideo = document.getElementById('outputVideo');

    convertBtn.addEventListener('click', async () => {
        const file = document.getElementById('videoInput').files[0];
        if (!file) return alert("Select a file!");

        convertBtn.disabled = true;
        status.innerText = "⚡ Initializing Engine (GitHub Patch)...";

        try {
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            status.innerText = "🎬 Processing (10s Trim)...";
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

            const mode = document.getElementById('modeSelect').value;
            const filter = (mode === 'crop') 
                ? 'crop=ih*(9/16):ih,setsar=1' 
                : 'scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2';

            await ffmpeg.run('-i', 'input.mp4', '-t', '10', '-vf', filter, '-c:v', 'libx264', '-preset', 'ultrafast', 'output.mp4');

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            
            if (finalVideoBlobUrl) URL.revokeObjectURL(finalVideoBlobUrl);
            finalVideoBlobUrl = URL.createObjectURL(videoBlob);

            outputVideo.src = finalVideoBlobUrl;
            previewArea.style.display = "block";
            downloadBtn.style.display = "block";
            status.innerText = "✅ DONE!";
        } catch (err) {
            status.innerText = "❌ ERROR: " + err.message;
            console.error(err);
        }
        convertBtn.disabled = false;
    });

    downloadBtn.addEventListener('click', () => {
        const a = document.createElement('a');
        a.href = finalVideoBlobUrl;
        a.download = "youtube_short.mp4";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    });
</script>

</body>
</html>
