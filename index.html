<div class="panel">
    <h1>Shorts Master</h1>
    <div class="system-check" id="sysCheck">Checking Security...</div>

    <div id="mainUI" style="opacity: 0.2; pointer-events: none;">
        <div class="section">
            <label>1. Source (File or URL)</label>
            <input type="file" id="videoInput" accept="video/*">
            <input type="text" id="urlInput" placeholder="https://example.com/video.mp4" style="width:100%; padding:10px; margin-top:5px; background:#333; color:white; border:1px solid #444; border-radius:5px;">
            
            <label style="margin-top:15px;">2. Aspect Style</label>
            <select id="modeSelect">
                <option value="crop">9:16 Center Crop</option>
                <option value="fit">9:16 Letterbox</option>
            </select>
            
            <button id="convertBtn" class="btn-convert">CONVERT & FIX PLAYBACK</button>
        </div>

        <div id="loadingSpinner" class="spinner"></div>
        <div id="status">Status: Ready</div>

        <div class="preview" id="previewArea">
            <video id="outputVideo" controls playsinline></video>
            <p>✅ Playable Output Generated!</p>
            <button id="downloadBtn" class="btn-download">💾 DOWNLOAD .MP4</button>
        </div>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });
    let finalVideoBlobUrl = null;

    // UI Elements
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const outputVideo = document.getElementById('outputVideo');

    convertBtn.addEventListener('click', async () => {
        const file = document.getElementById('videoInput').files[0];
        const url = document.getElementById('urlInput').value.trim();
        
        if (!file && !url) return alert("Select a file or enter a URL!");

        convertBtn.disabled = true;
        document.getElementById('loadingSpinner').style.display = "block";
        status.innerText = "⚡ Loading Video Data...";

        try {
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            // Handle Source (File vs URL)
            let videoData;
            if (file) {
                videoData = await fetchFile(file);
            } else {
                // Fetch from URL with CORS bypass attempt
                const response = await fetch(url, { mode: 'cors' });
                const blob = await response.blob();
                videoData = await fetchFile(blob);
            }

            ffmpeg.FS('writeFile', 'input.mp4', videoData);
            status.innerText = "🎬 Encoding for Playback...";

            const mode = document.getElementById('modeSelect').value;
            const filter = (mode === 'crop') 
                ? 'scale=w=-1:h=1920,crop=1080:1920,setsar=1' 
                : 'scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2';

            // CRITICAL: Added -pix_fmt yuv420p and -movflags +faststart for browser playback
            await ffmpeg.run(
                '-i', 'input.mp4', 
                '-t', '10', 
                '-vf', filter, 
                '-c:v', 'libx264', 
                '-preset', 'ultrafast', 
                '-pix_fmt', 'yuv420p', 
                '-movflags', '+faststart', 
                '-c:a', 'aac', 
                'output.mp4'
            );

            const data = ffmpeg.FS('readFile', 'output.mp4');
            const videoBlob = new Blob([data.buffer], { type: 'video/mp4' });
            
            if (finalVideoBlobUrl) URL.revokeObjectURL(finalVideoBlobUrl);
            finalVideoBlobUrl = URL.createObjectURL(videoBlob);

            outputVideo.src = finalVideoBlobUrl;
            document.getElementById('previewArea').style.display = "block";
            document.getElementById('downloadBtn').style.display = "block";
            status.innerText = "✨ SUCCESS!";
        } catch (err) {
            status.innerText = "❌ ERROR: Check CORS or Video Format";
            console.error(err);
        } finally {
            document.getElementById('loadingSpinner').style.display = "none";
            convertBtn.disabled = false;
        }
    });

    // Security check logic from previous version remains the same...
</script>
